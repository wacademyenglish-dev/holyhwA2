<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HW | The Hollywood Fixer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgBase: '#050505',
                        panelDark: '#111111',
                        accentGold: '#D4AF37',
                        accentRed: '#E50914',
                        textMain: '#FDFCF0'
                    },
                    fontFamily: {
                        epic: ['"Playfair Display"', 'serif'],
                        ui: ['"Inter"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #FDFCF0; display: flex; justify-content: center; font-family: 'Inter', sans-serif; overflow: hidden;}
        #app-container { width: 100%; max-width: 430px; height: 100vh; position: relative; overflow: hidden; background: #050505; border-left: 1px solid #222; border-right: 1px solid #222;}
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; padding: 24px; }
        .screen.active { display: flex; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.4s; }
        
        .glass-btn { background: transparent; border: 1px solid #333; color: #FDFCF0; transition: all 0.2s; position: relative; overflow: hidden; }
        .glass-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(212,175,55,0.1), transparent); transform: skewX(-20deg); transition: 0.5s; }
        .glass-btn:hover::before { left: 150%; }
        .glass-btn:active { transform: scale(0.98); border-color: #D4AF37; }
        
        .glow-gold { text-shadow: 0 0 10px rgba(212,175,55,0.5); }
    </style>
</head>
<body>
    <div id="app-container">
        
        <!-- Top Bar -->
        <div class="h-16 w-full flex items-center justify-between px-6 z-10 absolute top-0 left-0 bg-[#0A0A0A]/90 backdrop-blur-md border-b border-[#222]">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-star text-accentGold text-xs"></i>
                <span class="text-[10px] font-bold text-accentGold tracking-[0.3em] uppercase font-ui">VIP App</span>
            </div>
            <div class="flex gap-1.5" id="hearts-container">
                <i class="fa-solid fa-shield-halved text-accentRed text-lg drop-shadow-md" id="h1"></i>
                <i class="fa-solid fa-shield-halved text-accentRed text-lg drop-shadow-md" id="h2"></i>
                <i class="fa-solid fa-shield-halved text-accentRed text-lg drop-shadow-md" id="h3"></i>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="absolute top-16 left-0 w-full h-1 bg-[#111] z-10">
            <div id="progress-bar" class="h-full bg-accentGold transition-all duration-300" style="width: 0%"></div>
        </div>

        <div class="pt-20 pb-6 w-full h-full relative flex" id="screens-container">
            <!-- Screens injected by JS -->
        </div>

    </div>

    <script>
        const questions = [
            { q: "I saw Brad Pitt today. I saw [BLANK].", opts: ['him', 'he', 'his'], ans: "him" },
            { q: "Give the script to Mary. Give it to [BLANK].", opts: ['she', 'her', 'hers'], ans: "her" },
            { q: "The paparazzi are following the actors. They are following [BLANK].", opts: ['they', 'their', 'them'], ans: "them" },
            { q: "Where is my phone? I can't find [BLANK].", opts: ['it', 'its', 'him'], ans: "it" },
            { q: "Please, listen to [BLANK]. I have a plan to save the movie!", opts: ['I', 'me', 'my'], ans: "me" },
            { q: "The director wants to talk to you and me. He wants to talk to [BLANK].", opts: ['we', 'our', 'us'], ans: "us" },
            { q: "Don't look at the cameras. Ignore [BLANK].", opts: ['it', 'they', 'them'], ans: "them" },
            { q: "Call Angelina right now. Call [BLANK]!", opts: ['she', 'her', 'him'], ans: "her" },
            { q: "I need the contract. Send [BLANK] to my email.", opts: ['him', 'her', 'it'], ans: "it" },
            { q: "John is waiting outside. Give the car keys to [BLANK].", opts: ['he', 'his', 'him'], ans: "him" },
            { q: "They are looking at you. Just smile at [BLANK].", opts: ['them', 'they', 'their'], ans: "them" },
            { q: "We are in danger. Please help [BLANK]!", opts: ['we', 'our', 'us'], ans: "us" },
            { q: "I bought a gift for my mother. I bought it for [BLANK].", opts: ['her', 'she', 'him'], ans: "her" },
            { q: "I love this movie. I watch [BLANK] every year.", opts: ['it', 'him', 'them'], ans: "it" },
            { q: "The fans want to see Leonardo. Let's show [BLANK] to them!", opts: ['he', 'his', 'him'], ans: "him" }
        ];

        let currentQ = 0;
        let lives = 3;
        const totalQ = questions.length;

        function renderScreen() {
            const container = document.getElementById('screens-container');
            container.innerHTML = ''; 

            if (currentQ >= totalQ) {
                showResults();
                return;
            }

            // Update Progress
            document.getElementById('progress-bar').style.width = `${(currentQ / totalQ) * 100}%`;

            const q = questions[currentQ];
            const parts = q.q.split("[BLANK]");

            let html = `
                <div class="screen active justify-between h-full bg-[#111] m-6 mb-10 rounded-[2rem] border border-[#333] shadow-2xl relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 text-8xl text-[#222] opacity-50"><i class="fa-solid fa-comment-dots"></i></div>
                    
                    <div class="text-center mt-6 relative z-10">
                        <span class="text-[10px] text-textMuted font-bold font-ui tracking-[0.3em] uppercase border-b border-[#333] pb-1">Crisis ${currentQ + 1} / ${totalQ}</span>
                        <h2 class="text-2xl font-epic mt-8 leading-relaxed text-textMain px-4">
                            ${parts[0]}<span id="blank-space" class="border-b-2 border-dashed border-[#555] text-transparent px-4 mx-1 transition-all">___</span>${parts[1]}
                        </h2>
                    </div>

                    <div class="space-y-4 w-full mt-auto relative z-10" id="opts-container">
                        ${q.opts.map((opt, i) => `
                            <button class="w-full py-5 glass-btn rounded-xl font-ui font-bold text-lg tracking-wider uppercase flex items-center justify-center gap-4" onclick="checkAnswer(this, '${opt}', '${q.ans}')">
                                <span>${opt}</span>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }

        function checkAnswer(btn, selected, correct) {
            const blank = document.getElementById('blank-space');
            const container = document.getElementById('opts-container');
            
            // Disable buttons
            Array.from(container.children).forEach(b => b.style.pointerEvents = 'none');
            
            blank.innerText = selected;
            blank.classList.remove('text-transparent', 'border-dashed', 'border-[#555]');

            if (selected === correct) {
                // Correct
                blank.className = "text-[#050505] bg-accentGold font-bold px-2 mx-1 rounded";
                btn.style.backgroundColor = '#D4AF37';
                btn.style.borderColor = '#D4AF37';
                btn.style.color = '#050505';
                
                setTimeout(() => { currentQ++; renderScreen(); }, 800);
            } else {
                // Wrong
                blank.className = "text-[#050505] bg-accentRed font-bold px-2 mx-1 rounded";
                btn.style.backgroundColor = '#E50914';
                btn.style.borderColor = '#E50914';
                
                const screen = document.querySelector('.screen.active');
                screen.classList.add('shake');
                loseLife();
                
                setTimeout(() => {
                    screen.classList.remove('shake');
                }, 500);

                setTimeout(() => { currentQ++; renderScreen(); }, 1200);
            }
        }

        function loseLife() {
            lives--;
            const heart = document.getElementById(`h${lives + 1}`);
            heart.style.opacity = '0.2';
            heart.classList.remove('text-accentRed');
            heart.classList.add('text-[#333]');
            
            if (lives <= 0) {
                setTimeout(showGameOver, 600);
            }
        }

        function showGameOver() {
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('progress-bar').style.backgroundColor = '#E50914';
            
            const container = document.getElementById('screens-container');
            container.innerHTML = `
                <div class="screen active justify-center items-center text-center">
                    <div class="w-32 h-32 bg-[#111] border-2 border-accentRed rounded-full flex items-center justify-center mb-8 shadow-[0_0_30px_rgba(229,9,20,0.3)]">
                        <i class="fa-solid fa-camera-retro text-6xl text-accentRed animate-pulse"></i>
                    </div>
                    <h2 class="text-4xl font-epic font-black text-textMain mb-2 uppercase tracking-widest">CRISIS!</h2>
                    <p class="text-textMuted mb-12 font-ui tracking-widest text-sm uppercase">Paparazzi caught you.</p>
                    <button class="w-full py-5 bg-accentRed text-white rounded-xl font-ui font-bold tracking-widest text-lg shadow-[0_0_20px_rgba(229,9,20,0.4)] uppercase" onclick="location.reload()">REBOOT SYSTEM</button>
                </div>
            `;
        }

        function showResults() {
            document.getElementById('progress-bar').style.width = '100%';
            
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#D4AF37', '#E50914', '#FFFFFF']});
            
            const container = document.getElementById('screens-container');
            const score = Math.round(( (totalQ - (3 - lives)) / totalQ ) * 100); 
            
            container.innerHTML = `
                <div class="screen active justify-center items-center text-center">
                    <div class="w-32 h-32 bg-[#111] border-2 border-accentGold rounded-full flex items-center justify-center mb-8 shadow-[0_0_30px_rgba(212,175,55,0.3)]">
                        <i class="fa-solid fa-star text-6xl text-accentGold glow-gold"></i>
                    </div>
                    <h2 class="text-3xl font-epic font-black text-textMain mb-2 uppercase tracking-widest">CRISIS AVERTED</h2>
                    <p class="text-textMuted mb-4 font-ui tracking-widest text-xs uppercase">Hollywood is safe.</p>
                    <div class="text-6xl font-black font-epic text-accentGold mb-12 drop-shadow-md">
                        ${score}%
                    </div>
                    <button class="w-full py-5 bg-transparent border border-accentGold text-accentGold rounded-xl font-ui font-bold tracking-widest text-lg hover:bg-accentGold hover:text-[#050505] transition-colors uppercase" onclick="location.reload()">PLAY AGAIN</button>
                </div>
            `;
        }

        // Start App
        renderScreen();
    </script>
</body>
</html>
